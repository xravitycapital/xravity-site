<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — Xravity</title>
  <style>
    body { margin: 0; background: #0d0d14; }
  </style>
</head>
<body>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    (function() {
      var widget = window.netlifyIdentity;
      var hash = window.location.hash;
      var hasToken = !!(hash && (
        hash.indexOf('invite_token') !== -1 ||
        hash.indexOf('recovery_token') !== -1 ||
        hash.indexOf('confirmation_token') !== -1
      ));

      // After successful login, strip hash and reload to show CMS
      widget.on('login', function() {
        if (window.location.hash) {
          window.location.replace('/admin/');
        } else {
          loadCMS();
        }
      });

      widget.on('init', function(user) {
        if (user && !hasToken) {
          // Logged in, no stray token — show CMS
          loadCMS();
        } else if (hasToken) {
          // Identity widget will show Set Password / Confirm form
          // Do nothing — let the widget handle it
          // The 'login' handler above will trigger loadCMS after success
        } else {
          // Not logged in, no invite token — show CMS (which has its own login UI)
          loadCMS();
        }
      });

      function loadCMS() {
        var s = document.createElement('script');
        s.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
        document.body.appendChild(s);
      }
    })();
  </script>
</body>
</html>
