<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — Xravity</title>
  <style>
    body { margin: 0; background: #0d0d14; }
  </style>
</head>
<body>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    (function() {
      var widget = window.netlifyIdentity;
      var hash = window.location.hash;

      var hasToken = !!(hash && (
        hash.indexOf('invite_token') !== -1 ||
        hash.indexOf('recovery_token') !== -1 ||
        hash.indexOf('confirmation_token') !== -1
      ));

      // Handle invite/recovery: after password set, strip the hash
      if (hasToken) {
        widget.on('login', function() {
          window.location.replace('/admin/');
        });
        // Let widget process the token (show Set Password form etc)
        return;
      }

      // Normal flow: just load the CMS, it handles its own login UI
      widget.on('init', function(user) {
        // Load CMS whether logged in or not — Decap CMS handles auth UI itself
        var s = document.createElement('script');
        s.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
        document.body.appendChild(s);
      });
    })();
  </script>
</body>
</html>
