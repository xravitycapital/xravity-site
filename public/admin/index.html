<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — Xravity</title>
  <style>
    body { margin: 0; background: #0d0d14; font-family: system-ui, sans-serif; }
    #login-prompt {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e8e8f0;
      gap: 1.5rem;
    }
    #login-prompt h1 { font-size: 1.4rem; font-weight: 500; }
    #login-prompt button {
      padding: 0.85rem 2.5rem;
      font-size: 1rem;
      border: 1.5px solid #d4a843;
      background: transparent;
      color: #d4a843;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }
    #login-prompt button:hover { background: #d4a843; color: #0d0d14; }
  </style>
</head>
<body>
  <div id="login-prompt">
    <h1>Content Manager</h1>
    <button id="loginBtn">Login with Netlify Identity</button>
  </div>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    (function() {
      var widget = window.netlifyIdentity;
      var hash = window.location.hash;
      var prompt = document.getElementById('login-prompt')!;
      var loginBtn = document.getElementById('loginBtn')!;
      var cmsStarted = false;

      function startCMS() {
        if (cmsStarted) return;
        cmsStarted = true;
        prompt.style.display = 'none';
        var s = document.createElement('script');
        s.src = 'https://unpkg.com/decap-cms@3.6.1/dist/decap-cms.js';
        document.body.appendChild(s);
      }

      // Handle invite/recovery tokens
      if (hash && (hash.indexOf('invite_token') !== -1 || hash.indexOf('recovery_token') !== -1 || hash.indexOf('confirmation_token') !== -1)) {
        prompt.querySelector('h1')!.textContent = 'Set Your Password';
        loginBtn.style.display = 'none';
        widget.on('login', function() { window.location.replace('/admin/'); });
        // Let widget process the token — it will show the Set Password form
        return;
      }

      // Manual login button
      loginBtn.addEventListener('click', function() { widget.open(); });

      // Check initial state
      widget.on('init', function(user) {
        if (user) {
          startCMS();
        }
      });

      // After login via our button
      widget.on('login', function(user) {
        if (user) startCMS();
      });
    })();
  </script>
</body>
</html>
