<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — Xravity</title>
  <style>
    body { margin: 0; background: #0d0d14; }
  </style>
</head>
<body>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    (function() {
      var widget = window.netlifyIdentity;
      var hash = window.location.hash;
      var cmsLoaded = false;

      var hasToken = !!(hash && (
        hash.indexOf('invite_token') !== -1 ||
        hash.indexOf('recovery_token') !== -1 ||
        hash.indexOf('confirmation_token') !== -1
      ));

      function loadCMS() {
        if (cmsLoaded) return;
        cmsLoaded = true;
        var s = document.createElement('script');
        s.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
        document.body.appendChild(s);
      }

      // If a login happens while CMS is already loaded, just reload to sync state
      widget.on('login', function(user) {
        if (user) {
          if (hasToken || window.location.hash) {
            window.location.replace('/admin/');
          } else if (!cmsLoaded) {
            loadCMS();
          } else {
            // CMS already loaded and user just logged in — refresh to pick up session
            window.location.reload();
          }
        }
      });

      widget.on('init', function(user) {
        if (hasToken) {
          // Identity widget will show Set Password / Confirm form
          // Do nothing — let the widget handle it
          // When login completes, the 'login' handler above fires → strip hash → reload
          return;
        }
        // Logged in or not — load CMS either way (it handles its own login UI)
        loadCMS();
      });
    })();
  </script>
</body>
</html>
